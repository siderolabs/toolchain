name: binutils
variant: scratch
dependencies:
  - stage: c
  - image: "stagex/perl@sha256:{{ .stagex_perl_sha256 }}"
  - image: "stagex/texinfo@sha256:{{ .stagex_texinfo_sha256 }}"
steps:
  - sources:
      - url: https://ftp.gnu.org/gnu/binutils/binutils-{{ .binutils_version | replace "_" "." }}.tar.xz
        destination: binutils.tar.xz
        sha256: "{{ .binutils_sha256 }}"
        sha512: "{{ .binutils_sha512 }}"
    prepare:
      - |
        tar -xJf binutils.tar.xz --strip-components=1

        mkdir build
        cd build

        ../configure \
        --build=${BUILD} \
        --host=${HOST} \
        --prefix=/usr \
        --disable-nls \
        --disable-gprofng \
        --disable-werror \
        --enable-deterministic-archives \
        --enable-targets=aarch64-linux-musl,aarch64_be-linux-musl,i686-linux-musl,x86_64-linux-musl,x86_64-linux-muslx32,x86_64-pep
    build:
      - |
        cd build
        make -j $(nproc)
    install:
      - |
        cd build
        make DESTDIR=/rootfs install
        make -C ld clean
        make -C ld LIB_PATH=/usr/lib:/lib
        cp -v ld/ld-new /rootfs/bin
        rm -rf /rootfs/share/man
finalize:
  - from: /rootfs
    to: /
