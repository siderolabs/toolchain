name: golang
variant: scratch
dependencies:
  - image: "stagex/busybox@sha256:{{ .stagex_busybox_sha256 }}"
  - image: "stagex/go@sha256:{{ .stagex_go_sha256 }}"
steps:
  - sources:
      - url: https://dl.google.com/go/go{{ .golang_version }}.src.tar.gz
        destination: go.src.tar.gz
        sha256: "{{ .golang_sha256 }}"
        sha512: "{{ .golang_sha512 }}"

    env:
      GOARCH: {{ if eq .ARCH "aarch64"}}arm64{{ else if eq .ARCH "x86_64" }}amd64{{ else }}unsupported{{ end }}
      GOROOT_FINAL: '{{ .TOOLCHAIN }}/go'

    prepare:
      - tar -xzf go.src.tar.gz --strip-components=1
      - rm go.src.tar.gz

    build:
      - cd src && sh make.bash
    install:
      - rm -rf pkg/obj
      - rm -rf pkg/bootstrap
      - rm -f pkg/tool/*/api
      - |
        find src \( -type f -a -name "*_test.go" \) \
        -exec rm -rf \{\} \+
      - |
        find src \( -type d -a -name "testdata" \) \
        -exec rm -rf \{\} \+
      - |
        find src -type f -a \( -name "*.bash" -o -name "*.rc" -o -name "*.bat" \) \
        -exec rm -rf \{\} \+

    # as stagex is amd64, arm64 builds are cross builds and store binaries at a different path
    # {{ if eq .ARCH "aarch64" }} This in fact is YAML comment, but Go templating instruction is evaluated by bldr
      - mv bin/linux_arm64/* bin/
      - rm -rf bin/linux_arm64
      - rm -rf pkg/tool/linux_amd64
    # {{ end }} This in fact is YAML comment, but Go templating instruction is evaluated by bldr

      - mkdir -p "${GOROOT_FINAL}"
      - mv * "${GOROOT_FINAL}"
finalize:
  - from: "{{ .TOOLCHAIN }}"
    to: "{{ .TOOLCHAIN }}"
