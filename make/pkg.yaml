name: make
variant: scratch
dependencies:
  - image: "stagex/binutils@sha256:{{ .stagex_binutils_sha256 }}"
  - image: "stagex/busybox@sha256:{{ .stagex_busybox_sha256 }}"
  - image: "stagex/gcc@sha256:{{ .stagex_gcc_sha256 }}"
  - image: "stagex/make@sha256:{{ .stagex_make_sha256 }}"
  - image: "stagex/musl@sha256:{{ .stagex_musl_sha256 }}"
steps:
  - sources:
      - url: https://ftp.gnu.org/gnu/make/make-{{ .make_version }}.tar.gz
        destination: make.tar.gz
        sha256: "{{ .make_sha256 }}"
        sha512: "{{ .make_sha512 }}"
    prepare:
      - |
        tar -xzf make.tar.gz --strip-components=1
        mkdir build
        cd build
        ../configure \
            --prefix=/usr \
            --without-guile
    build:
      - |
        cd build
        make -j $(nproc)
    install:
      - |
        cd build
        make DESTDIR=/rootfs install
finalize:
  - from: /rootfs
    to: /
