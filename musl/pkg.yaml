name: musl
variant: scratch
dependencies:
  - image: "stagex/binutils@sha256:{{ .stagex_binutils_sha256 }}"
  - image: "stagex/busybox@sha256:{{ .stagex_busybox_sha256 }}"
  - image: "stagex/diffutils@sha256:{{ .stagex_diffutils_sha256 }}"
  - image: "stagex/gcc@sha256:{{ .stagex_gcc_sha256 }}"
  - image: "stagex/make@sha256:{{ .stagex_make_sha256 }}"
  - image: "stagex/musl@sha256:{{ .stagex_musl_sha256 }}"
steps:
  - sources:
      - url: https://www.musl-libc.org/releases/musl-{{ .musl_version }}.tar.gz
        destination: musl.tar.gz
        sha256: "{{ .musl_sha256 }}"
        sha512: "{{ .musl_sha512 }}"
    env:
      # disable any optimizations, as musl does its own
      CFLAGS: ""
      CXXFLAGS: ""
      LDFLAGS: ""
    prepare:
      - |
        tar -xzf musl.tar.gz --strip-components=1

        patch -p1 < /pkg/patches/handle-aux-at-base.patch
        patch -p1 < /pkg/patches/close-range.patch

        mkdir build
        cd build

        ../configure --prefix=/usr
    build:
      - |
        cd build
        make -j $(nproc)
    install:
      - |
        cd build
        make DESTDIR=/rootfs install
finalize:
  - from: /rootfs
    to: /
